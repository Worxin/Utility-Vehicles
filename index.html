<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORXIN - Ultimate Visual Configurator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0a0a0a; color: #ffffff; font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .configurator-card { display: flex; flex-direction: row; width: 100%; max-width: 1200px; background: #141414; border-radius: 24px; border: 1px solid #262626; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        .preview-section { flex: 1.3; background: radial-gradient(circle, #22252a 0%, #0d0e11 100%); display: flex; justify-content: center; align-items: center; padding: 40px; position: relative; border-right: 1px solid #262626; min-height: 450px; }
        .image-container { position: relative; width: 100%; max-width: 500px; aspect-ratio: 4/3; display: flex; justify-content: center; align-items: center; }
        
        /* 核心：所有图层绝对定位重叠 */
        .layer { position: absolute; width: 100%; height: 100%; object-fit: contain; top: 0; left: 0; transition: opacity 0.3s ease; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6)); }
        .layer.hidden { opacity: 0; pointer-events: none; }
        
        .options-section { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: space-between; background: #141414; }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 25px; }
        .option-group { margin-bottom: 22px; }
        .group-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 10px; }
        
        .color-picker { display: flex; gap: 15px; }
        .color-dot { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .color-dot.grey { background-color: #555555; }
        .color-dot.red { background-color: #cc1111; }
        .color-dot.active { border-color: #00ffc8; transform: scale(1.1); }
        
        select { width: 100%; padding: 12px 16px; background: #1f1f1f; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 14px; outline: none; cursor: pointer; }
        select:focus { border-color: #00ffc8; }
        
        .price-box { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #262626; }
        .price-amount { font-size: 30px; font-weight: 800; color: #00ffc8; }
        .btn-screenshot { width: 100%; padding: 14px; background: #262626; border: 1px solid #3b3b3b; color: #fff; font-weight: 600; border-radius: 12px; cursor: pointer; margin-top: 15px; }
        .btn-screenshot:hover { border-color: #00ffc8; }
        .btn-whatsapp { width: 100%; padding: 15px; background: #25D366; color: #fff; font-weight: 700; text-align: center; text-decoration: none; display: block; margin-top: 10px; border-radius: 12px; }

        @media (max-width: 768px) {
            .configurator-card { flex-direction: column; }
            .preview-section { border-right: none; border-bottom: 1px solid #262626; }
        }
    </style>
</head>
<body>

<div class="configurator-card" id="main-config-card">
    
    <div class="preview-section">
        <div class="image-container">
            <img id="layer-base" src="base-grey.png" class="layer" alt="Base Vehicle">
            
            <img id="layer-battery-lead" src="acc-lead.png" class="layer" alt="Lead-Acid Battery">
            <img id="layer-battery-lithium" src="acc-lithium.png" class="layer hidden" alt="Lithium Battery">
            
            <img id="layer-tires" src="acc-tires.png" class="layer hidden" alt="Tires Upgrade">
            
            <img id="layer-roof" src="acc-roof.png" class="layer hidden" alt="Roof Upgrade">
            <img id="layer-plow" src="acc-plow.png" class="layer hidden" alt="Plow Upgrade">

            <img id="layer-delivery-port" src="loc-port.png" class="layer hidden" alt="Port Pickup">
            <img id="layer-delivery-home" src="loc-home.png" class="layer hidden" alt="Home Delivery">
        </div>
    </div>
    
    <div class="options-section">
        <div>
            <h1>WORXIN Modular Configurator</h1>
            <p class="subtitle">Customize every single detail of your premium e-trike</p>
            
            <div class="option-group">
                <div class="group-title">1. Vehicle Color</div>
                <div class="color-picker">
                    <div class="color-dot grey active" data-color="Grey" data-img="base-grey.png" onclick="changeColor(this)"></div>
                    <div class="color-dot red" data-color="Red" data-img="base-red.png" onclick="changeColor(this)"></div>
                </div>
            </div>
            
            <div class="option-group">
                <div class="group-title">2. Battery Type</div>
                <select id="battery" onchange="updateConfig()">
                    <option value="Lead-Acid" data-price="0" data-show="layer-battery-lead">Lead-Acid Battery (Standard)</option>
                    <option value="Lithium" data-price="850" data-show="layer-battery-lithium">Lithium-Ion Pack (+$850)</option>
                </select>
            </div>
            
            <div class="option-group">
                <div class="group-title">3. Tire Selection</div>
                <select id="tires" onchange="updateConfig()">
                    <option value="Standard" data-price="0" data-layer="none">Standard Road Tires</option>
                    <option value="All-Terrain" data-price="260" data-layer="layer-tires">All-Terrain Off-Road Tires (+$260)</option>
                </select>
            </div>
            
            <div class="option-group">
                <div class="group-title">4. Add-on Attachments</div>
                <select id="addons" onchange="updateConfig()">
                    <option value="None" data-price="0" data-layers="none">No Add-ons</option>
                    <option value="Roof" data-price="180" data-layers="layer-roof">Sunshade & Rain Roof (+$180)</option>
                    <option value="SnowPlow" data-price="450" data-layers="layer-plow">Heavy Duty Snow Plow (+$450)</option>
                    <option value="Both" data-price="630" data-layers="layer-roof,layer-plow">Roof + Snow Plow Combo (+$630)</option>
                </select>
            </div>

            <div class="option-group">
                <div class="group-title">5. Destination & Logistics</div>
                <select id="delivery" onchange="updateConfig()">
                    <option value="Port" data-price="350" data-layer="layer-delivery-port">Pick up at Nearest Canadian Port ($350)</option>
                    <option value="Home" data-price="650" data-layer="layer-delivery-home">Door-to-Door Delivery ($650)</option>
                </select>
            </div>
        </div>
        
        <div>
            <div class="price-box">
                <div class="price-label">Total Price (CAD)</div>
                <div class="price-amount" id="final-price">$2,850</div>
            </div>
            <button class="btn-screenshot" onclick="captureOrder()">📸 Save Custom Configuration Image</button>
            <a id="whatsapp-link" href="https://wa.me/8613800000000?text=Hi!%20Check%20out%20my%20custom%20trike%20configuration." target="_blank" class="btn-whatsapp">💬 Send to WhatsApp to Order</a>
        </div>
    </div>
</div>

<script>
    const BASE_PRICE = 2500;
    let currentColor = "Grey";

    function changeColor(element) {
        document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('layer-base').src = element.getAttribute('data-img');
        currentColor = element.getAttribute('data-color');
    }

    function updateConfig() {
        let selectedBatteryLayer = document.getElementById('battery').selectedOptions[0].getAttribute('data-show');
        if(selectedBatteryLayer === 'layer-battery-lead') {
            document.getElementById('layer-battery-lead').classList.remove('hidden');
            document.getElementById('layer-battery-lithium').classList.add('hidden');
        } else {
            document.getElementById('layer-battery-lead').classList.add('hidden');
            document.getElementById('layer-battery-lithium').classList.remove('hidden');
        }

        let tiresLayer = document.getElementById('tires').selectedOptions[0].getAttribute('data-layer');
        if(tiresLayer === 'layer-tires') {
            document.getElementById('layer-tires').classList.remove('hidden');
        } else {
            document.getElementById('layer-tires').classList.add('hidden');
        }

        document.getElementById('layer-roof').classList.add('hidden');
        document.getElementById('layer-plow').classList.add('hidden');
        let addonsLayers = document.getElementById('addons').selectedOptions[0].getAttribute('data-layers');
        if(addonsLayers && addonsLayers !== 'none') {
            addonsLayers.split(',').forEach(id => {
                document.getElementById(id).classList.remove('hidden');
            });
        }

        document.getElementById('layer-delivery-port').classList.add('hidden');
        document.getElementById('layer-delivery-home').classList.add('hidden');
        let deliveryLayer = document.getElementById('delivery').selectedOptions[0].getAttribute('data-layer');
        if(deliveryLayer && deliveryLayer !== 'none') {
            document.getElementById(deliveryLayer).classList.remove('hidden');
        }

        let p1 = parseFloat(document.getElementById('battery').selectedOptions[0].getAttribute('data-price'));
        let p2 = parseFloat(document.getElementById('tires').selectedOptions[0].getAttribute('data-price'));
        let p3 = parseFloat(document.getElementById('addons').selectedOptions[0].getAttribute('data-price'));
        let p4 = parseFloat(document.getElementById('delivery').selectedOptions[0].getAttribute('data-price'));
        
        let total = BASE_PRICE + p1 + p2 + p3 + p4;
        document.getElementById('final-price').innerText = "$" + total.toLocaleString() + " CAD";
    }

    function captureOrder() {
        const target = document.getElementById("main-config-card");
        html2canvas(target, { backgroundColor: "#141414", useCORS: true }).then(canvas => {
            let link = document.createElement('a');
            link.download = `WORXIN-${currentColor}-Custom.png`;
            link.href = canvas.toDataURL();
            link.click();
            alert("Saved! Please send this image to us on WhatsApp.");
        });
    }
    updateConfig();
</script>

</body>
</html>
